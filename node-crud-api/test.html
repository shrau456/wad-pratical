<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>API Tester</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
    }
  </style>
</head>

<body>

<div class="container mt-5">

  <h2 class="text-center text-white mb-4">User API Dashboard</h2>

  <div class="card p-4 shadow">

    <!-- Form -->
    <h4>Add User</h4>

    <input id="name" class="form-control mb-2" placeholder="Name">
    <input id="email" class="form-control mb-3" placeholder="Email">

    <button class="btn btn-primary w-100 mb-3" onclick="addUser()">Add User</button>

    <!-- Button -->
    <div class="text-center mb-3">
      <button class="btn btn-success" onclick="getUsers()">Get Users</button>
    </div>

    <!-- Table (Hidden Initially) -->
    <div id="tableContainer" style="display: none;">

      <table class="table table-bordered table-striped">
        <thead class="table-dark">
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>

    </div>

  </div>

</div>

<script>

function getUsers() {
  fetch("http://localhost:3000/users")
    .then(res => res.json())
    .then(data => {

      // Show table
      document.getElementById("tableContainer").style.display = "block";

      let table = document.getElementById("tableBody");
      table.innerHTML = "";

      data.forEach((user, index) => {
        let row = `
          <tr>
            <td>${index}</td>
            <td>${user.name}</td>
            <td>${user.email}</td>
          </tr>
        `;
        table.innerHTML += row;
      });
    });
}

function addUser() {
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;

  fetch("http://localhost:3000/users", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name, email })
  })
  .then(res => res.text())
  .then(msg => {
    alert(msg);

    // Hide table after adding (optional clean UI)
    document.getElementById("tableContainer").style.display = "none";

    // Clear inputs
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
  });
}

</script>

</body>
</html>
