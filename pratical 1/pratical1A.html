<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body {
    background-color: #f4f6f9;
}

.sidebar {
    height: 100vh;
    background: #1e293b;
    color: white;
    padding: 20px;
}

.sidebar h3 {
    margin-bottom: 20px;
}

.sidebar a {
    display: block;
    color: #cbd5e1;
    text-decoration: none;
    margin: 10px 0;
    padding: 10px;
    border-radius: 5px;
}

.sidebar a:hover {
    background: #334155;
    color: white;
}

.card-box {
    border-radius: 12px;
    padding: 20px;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.card-box i {
    font-size: 30px;
}

.bg-students { background: #3b82f6; }
.bg-faculty { background: #10b981; }
.bg-dept { background: #f59e0b; }
.bg-course { background: #ef4444; }

</style>
</head>

<body>

<div class="container-fluid">
<div class="row">

    <div class="col-md-3 col-lg-2 sidebar">
        <h3>🎓 College</h3>
        <a href="#"><i class="fas fa-home"></i> Dashboard</a>
        <a href="#"><i class="fas fa-user-graduate"></i> Students</a>
        <a href="#"><i class="fas fa-chalkboard-teacher"></i> Faculty</a>
        <a href="#"><i class="fas fa-building"></i> Departments</a>
        <a href="#"><i class="fas fa-book"></i> Courses</a>
    </div>

    <div class="col-md-9 col-lg-10 p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>College Dashboard</h2>
            <button class="btn btn-dark">Logout</button>
        </div>

        <div class="row g-4">

            <div class="col-md-6 col-lg-3">
                <div class="card-box bg-students">
                    <div>
                        <h5>Students</h5>
                        <h2>1200</h2>
                    </div>
                    <i class="fas fa-user-graduate"></i>
                </div>
            </div>

            <div class="col-md-6 col-lg-3">
                <div class="card-box bg-faculty">
                    <div>
                        <h5>Faculty</h5>
                        <h2>80</h2>
                    </div>
                    <i class="fas fa-chalkboard-teacher"></i>
                </div>
            </div>

            <div class="col-md-6 col-lg-3">
                <div class="card-box bg-dept">
                    <div>
                        <h5>Departments</h5>
                        <h2>10</h2>
                    </div>
                    <i class="fas fa-building"></i>
                </div>
            </div>

            <div class="col-md-6 col-lg-3">
                <div class="card-box bg-course">
                    <div>
                        <h5>Courses</h5>
                        <h2>25</h2>
                    </div>
                    <i class="fas fa-book"></i>
                </div>
            </div>

        </div>

        <div class="mt-5">
            <h4>Recent Students</h4>

            <table class="table table-striped mt-3">
                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th>Department</th>
                        <th>Year</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Shravani</td>
                        <td>IT</td>
                        <td>3rd</td>
                    </tr>
                    <tr>
                        <td>Shweta</td>
                        <td>Computer</td>
                        <td>2nd</td>
                    </tr>
                    <tr>
                        <td>Sushmita</td>
                        <td>Electrical</td>
                        <td>4th</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

</div>
</div>

</body>
</html>
