<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
}

.card {
    border-radius: 15px;
}

</style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    
    <div class="card p-4 shadow-lg" style="width: 400px;">
        
        <h3 class="text-center mb-3">Student Registration</h3>

        <form onsubmit="saveData(event)">
            
            <div class="mb-3">
                <label>Name</label>
                <input type="text" id="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" id="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Course</label>
                <input type="text" id="course" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Year</label>
                <select id="year" class="form-control">
                    <option>select</option>
                    <option>1st</option>
                    <option>2nd</option>
                    <option>3rd</option>
                    <option>4th</option>
                </select>
            </div>

            <button class="btn btn-primary w-100 mb-2">Register</button>

        </form>

        <button onclick="viewUsers()" class="btn btn-success w-100">
            View Registered Users
        </button>

    </div>

</div>

<script>
function saveData(event) {
    event.preventDefault();

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let course = document.getElementById("course").value;
    let year = document.getElementById("year").value;

    let users = JSON.parse(localStorage.getItem("users")) || [];

    users.push({ name, email, course, year });

    localStorage.setItem("users", JSON.stringify(users));

    alert("Registration Successful!");

    document.querySelector("form").reset();
}

function viewUsers() {
    window.location.href = "display.html";
}
</script>

</body>
</html>
